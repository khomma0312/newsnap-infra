version: 2
updates:
  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    target-branch: develop
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    target-branch: develop