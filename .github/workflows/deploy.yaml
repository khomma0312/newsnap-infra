name: Deploy

on:
  push:
    branches:
    - "develop"
    - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}       # AWS CLI / configure-aws-credentials 用
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_app_name: ${{ vars.APP_NAME }}
  TF_VAR_zone_domain: ${{ vars.ZONE_DOMAIN }}
  TF_VAR_db_name: ${{ vars.DB_NAME }}
  TF_VAR_db_admin_user: ${{ secrets.DB_ADMIN_USER }}
  TF_DIR: ${{ github.ref == 'refs/heads/main' && 'environment/prod' || 'environment/dev' }}

jobs:
  lint:
    name: Lint Terraform
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "~1.12"
    - name: terraform fmt
      run: terraform fmt -check -recursive
    - name: terraform init
      run: terraform init -backend=false
      working-directory: ${{ env.TF_DIR }}
    - name: terraform validate
      run: terraform validate
      working-directory: ${{ env.TF_DIR }}

  plan:
    name: Plan Terraform
    runs-on: ubuntu-latest
    needs: lint
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "~1.12"
    - name: terraform init
      run: terraform init
      working-directory: ${{ env.TF_DIR }}
    - name: terraform plan
      run: terraform plan -out=tfplan
      working-directory: ${{ env.TF_DIR }}
    - name: Upload plan file
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.TF_DIR }}/tfplan
        retention-days: 7

  apply:
    name: Apply Terraform
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "~1.12"
    - name: terraform init
      run: terraform init
      working-directory: ${{ env.TF_DIR }}
    - name: Download plan file
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: ${{ env.TF_DIR }}
    - name: terraform apply
      run: terraform apply tfplan
      working-directory: ${{ env.TF_DIR }}
